<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre da Partitura - Prática de Leitura Musical</title>
    <meta name="description" content="Treine sua velocidade de leitura de partituras com este mini-game interativo.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header / HUD -->
        <header class="game-header">
            <div class="score-board">
                <div class="score-item">
                    <span class="label">Recorde Atual</span>
                    <span id="current-score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Melhor Recorde</span>
                    <span id="best-score" class="value">0</span>
                </div>
            </div>
            <button id="settings-toggle" class="icon-button" title="Configurações">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
            </button>
        </header>

        <!-- Main Display -->
        <main class="game-main">
            <div id="staff-container" class="staff-card">
                <div id="timer-bar" class="timer-bar"></div>
                <!-- SVG será injetado aqui -->
                <div id="staff-visual"></div>
                <div id="feedback-overlay" class="feedback-overlay"></div>
            </div>

            <div id="message-display" class="message-display">
                Prepare-se!
            </div>
        </main>

        <!-- Interaction Area -->
        <footer class="game-footer">
            <div class="piano-keyboard hide-labels" id="piano-keyboard">
                <div class="key white note-btn" data-note="Dó"><span class="key-label">Dó</span></div>
                <div class="key black"></div>
                <div class="key white note-btn" data-note="Ré"><span class="key-label">Ré</span></div>
                <div class="key black"></div>
                <div class="key white note-btn" data-note="Mi"><span class="key-label">Mi</span></div>
                <div class="key white note-btn" data-note="Fá"><span class="key-label">Fá</span></div>
                <div class="key black"></div>
                <div class="key white note-btn" data-note="Sol"><span class="key-label">Sol</span></div>
                <div class="key black"></div>
                <div class="key white note-btn" data-note="Lá"><span class="key-label">Lá</span></div>
                <div class="key black"></div>
                <div class="key white note-btn" data-note="Si"><span class="key-label">Si</span></div>
            </div>
            
            <div id="start-screen" class="overlay active">
                <div class="overlay-content">
                    <h1>Mestre da Partitura</h1>
                    <p>Identifique as notas o mais rápido possível!</p>
                    <div class="button-group">
                        <button id="start-btn" class="primary-btn">Iniciar Jogo</button>
                        <button id="settings-start-btn" class="secondary-btn">Configurações</button>
                    </div>
                </div>
            </div>

            <div id="game-over-screen" class="overlay">
                <div class="overlay-content">
                    <h2 class="error-text">Fim de Jogo!</h2>
                    <p id="final-score-text">Sua sequência: 0</p>
                    <div class="button-group">
                        <button id="restart-btn" class="primary-btn">Tentar Novamente</button>
                        <button id="settings-gameover-btn" class="secondary-btn">Configurações</button>
                    </div>
                </div>
            </div>
        </footer>

        <!-- Settings Sidebar -->
        <aside id="settings-panel" class="settings-panel">
            <div class="panel-header">
                <h3>Configurações</h3>
                <button id="settings-close" class="close-btn">&times;</button>
            </div>
            <div class="panel-body">
                <div class="setting-group">
                    <label>Tema</label>
                    <div class="clef-selection">
                        <label class="clef-option">
                            <input type="radio" name="theme-type" value="dark" checked>
                            <div class="clef-box">Escuro</div>
                        </label>
                        <label class="clef-option">
                            <input type="radio" name="theme-type" value="light">
                            <div class="clef-box">Claro</div>
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Clave para praticar</label>
                    <div class="clef-selection">
                        <label class="clef-option">
                            <input type="radio" name="clef-type" value="sol" checked>
                            <div class="clef-box">Sol</div>
                        </label>
                        <label class="clef-option">
                            <input type="radio" name="clef-type" value="fa">
                            <div class="clef-box">Fá</div>
                        </label>
                        <label class="clef-option">
                            <input type="radio" name="clef-type" value="both">
                            <div class="clef-box">Ambas</div>
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="interval-input">Intervalo entre notas (ms)</label>
                    <input type="range" id="interval-input" min="1000" max="10000" step="500" value="2000">
                    <span id="interval-value">2000ms</span>
                </div>
                <div class="setting-group">
                    <label for="timeout-input">Tempo de resposta (ms)</label>
                    <input type="range" id="timeout-input" min="500" max="5000" step="100" value="5000">
                    <span id="timeout-value">5000ms</span>
                </div>
                <div class="setting-group">
                    <label class="toggle-label">
                        <input type="checkbox" id="sound-toggle" checked>
                        Tocar som da nota ao acertar
                    </label>
                </div>
                <div class="setting-group">
                    <label class="toggle-label">
                        <input type="checkbox" id="labels-toggle">
                        Mostrar nomes nas teclas
                    </label>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
